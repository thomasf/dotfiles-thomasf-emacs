public = true

[[ignore]]
match = ['Dockerfile', '.dockerignore',  "NOTES.org", ".compiled", '.log']

[[script]]
src = '''
rev=$(git rev-parse HEAD)
compiled="$(cat .compiled 2>/dev/null || true)"
if ! [[ $rev == $compiled ]]; then
  cd emacs.d
  emacs --no-site -batch -l makeup.el  || true
    cd ..
  echo $rev > .compiled
fi
'''